name: CI

on:
  push:
    branches: [main]
    paths:
      - "prototypes/**"
      - "common/**"
  pull_request:
    branches: [main]
    paths:
      - "prototypes/**"
      - "common/**"

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect which prototypes changed
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      prototypes: ${{ steps.detect.outputs.prototypes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        name: Detect changed prototypes
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            BASE=${{ github.event.before }}
          else
            BASE=${{ github.event.pull_request.base.sha }}
          fi

          # Find changed prototype directories
          CHANGED=$(git diff --name-only "$BASE" HEAD \
            | grep '^prototypes/' \
            | cut -d'/' -f2 \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')

          # If common/ changed, run all prototypes
          if git diff --name-only "$BASE" HEAD | grep -q '^common/'; then
            CHANGED=$(ls prototypes/ | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi

          echo "prototypes=$CHANGED" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Python track
  # ---------------------------------------------------------------------------
  python:
    needs: changes
    if: needs.changes.outputs.prototypes != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        prototype: ${{ fromJson(needs.changes.outputs.prototypes) }}
    defaults:
      run:
        working-directory: prototypes/${{ matrix.prototype }}/python
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.10"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run ruff check . --select=ANN
        continue-on-error: true

      - name: Unit tests
        run: uv run pytest tests/unit -v

      - name: Integration tests (main only)
        if: github.ref == 'refs/heads/main'
        run: uv run pytest tests/integration -v
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Eval suite
        if: github.ref == 'refs/heads/main'
        run: uv run pytest tests/evals -v
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Docker build
        run: docker build -t agent-deployments/${{ matrix.prototype }}-python .

  # ---------------------------------------------------------------------------
  # TypeScript track
  # ---------------------------------------------------------------------------
  typescript:
    needs: changes
    if: needs.changes.outputs.prototypes != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        prototype: ${{ fromJson(needs.changes.outputs.prototypes) }}
    defaults:
      run:
        working-directory: prototypes/${{ matrix.prototype }}/typescript
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: prototypes/${{ matrix.prototype }}/typescript/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test:unit

      - name: Integration tests (main only)
        if: github.ref == 'refs/heads/main'
        run: pnpm run test:integration
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Eval suite (main only)
        if: github.ref == 'refs/heads/main'
        run: pnpm run test:eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Docker build
        run: docker build -t agent-deployments/${{ matrix.prototype }}-typescript .

  # ---------------------------------------------------------------------------
  # Security scan (Promptfoo)
  # ---------------------------------------------------------------------------
  security:
    needs: changes
    if: needs.changes.outputs.prototypes != '[]' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        prototype: ${{ fromJson(needs.changes.outputs.prototypes) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Promptfoo
        run: npm install -g promptfoo

      - name: Run security scan (Python eval config)
        run: promptfoo redteam run --config prototypes/${{ matrix.prototype }}/python/eval/promptfoo.yaml
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      - name: Run security scan (TypeScript eval config)
        run: promptfoo redteam run --config prototypes/${{ matrix.prototype }}/typescript/eval/promptfoo.yaml
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true
