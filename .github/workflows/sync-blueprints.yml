name: Sync Blueprints Vendored Tree

# Updates vendored/blueprints/ to a tagged release of agent-blueprints.
# Triggers:
#   - repository_dispatch (blueprints-release): fired by agent-blueprints'
#     notify-deployments.yml workflow whenever a release is published. The
#     client payload carries the release tag; this workflow pins vendir.yml
#     at that tag, runs `vendir sync`, regenerates the catalog, and opens
#     a PR with the diff.
#   - workflow_dispatch (manual): admin override. Specify the target tag in
#     the `tag` input; defaults to the latest release on agent-blueprints.
#
# Release-driven (not push-driven): vendored snapshots track tagged releases,
# not raw main HEAD. Stable consumers, deterministic sync diffs.

on:
  repository_dispatch:
    types: [blueprints-release]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Blueprints release tag to sync to (e.g. v0.3.0). Leave empty to use the latest release.'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: vendir sync vendored/blueprints/
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve target tag
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Precedence: repository_dispatch payload > workflow_dispatch input >
          # latest release lookup via gh.
          tag="${{ github.event.client_payload.tag }}"
          if [ -z "$tag" ]; then
            tag="${{ github.event.inputs.tag }}"
          fi
          if [ -z "$tag" ]; then
            tag=$(gh release view -R jagguvarma15/agent-blueprints --json tagName -q .tagName)
          fi
          if [ -z "$tag" ]; then
            echo "::error::Could not resolve a target release tag"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Target tag: $tag"

      - name: Pin vendir.yml to target tag
        run: |
          # Rewrite the `ref:` line so vendir syncs the released tarball.
          # Idempotent: re-running with the same tag is a no-op.
          tag="${{ steps.target.outputs.tag }}"
          python3 - "$tag" <<'PY'
          import re, sys, pathlib
          tag = sys.argv[1]
          path = pathlib.Path("vendir.yml")
          text = path.read_text(encoding="utf-8")
          new = re.sub(
              r"(\bref:\s*)\S+",
              lambda m: f"{m.group(1)}refs/tags/{tag}",
              text,
              count=1,
          )
          path.write_text(new, encoding="utf-8")
          PY

      - name: Install vendir
        uses: carvel-dev/setup-action@v2
        with:
          only: vendir
          vendir: v0.40.0

      - name: Sync vendored tree
        run: vendir sync

      - name: Set up Python (catalog regen)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install generator dependencies
        run: pip install -r scripts/requirements.txt

      - name: Regenerate catalog
        run: python scripts/generate_catalog.py

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- vendir.yml vendored/ vendir.lock.yml catalog.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open sync PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(blueprints): sync vendored to ${{ steps.target.outputs.tag }}'
          title: 'chore(blueprints): sync vendored to ${{ steps.target.outputs.tag }}'
          body: |
            Automated sync of `vendored/blueprints/` to upstream `agent-blueprints` release **${{ steps.target.outputs.tag }}**.

            **Trigger:** `${{ github.event_name }}`
            ${{ github.event.client_payload.html_url && format('**Release:** {0}', github.event.client_payload.html_url) || '' }}
            ${{ github.event.client_payload.name && format('**Release name:** {0}', github.event.client_payload.name) || '' }}

            Regenerated `catalog.yaml` is included so the catalog drift CI passes.
          branch: chore/blueprints-sync-${{ steps.target.outputs.tag }}
          delete-branch: true
          labels: automated-sync
