name: Sync Blueprints Vendored Tree

# Updates vendored/blueprints/ to a tagged release of agent-blueprints.
# Triggers:
#   - repository_dispatch (blueprints-release): fired by agent-blueprints'
#     notify-deployments.yml workflow whenever a release is published. The
#     client payload carries the release tag; this workflow pins vendir.yml
#     at that tag, runs `vendir sync`, regenerates the catalog, and opens
#     a PR with the diff.
#   - workflow_dispatch (manual): admin override. Specify the target tag in
#     the `tag` input; defaults to the latest release on agent-blueprints.
#
# Release-driven (not push-driven): vendored snapshots track tagged releases,
# not raw main HEAD. Stable consumers, deterministic sync diffs.

on:
  repository_dispatch:
    types: [blueprints-release]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Blueprints release tag (e.g. v0.3.0) OR a 40-char SHA when mode=sha. Leave empty to use the latest release.'
        required: false
        default: ''
      mode:
        description: 'Pin mode: `tag` (default, writes refs/tags/<tag>) or `sha` (writes the input verbatim — bootstrap-only use)'
        required: false
        default: 'tag'
        type: choice
        options:
          - tag
          - sha

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: vendir sync vendored/blueprints/
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve target ref
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Precedence: repository_dispatch payload > workflow_dispatch input >
          # latest release lookup via gh. Mode comes from workflow_dispatch
          # input (defaults to `tag`); repository_dispatch is always tag mode.
          mode="${{ github.event.inputs.mode }}"
          if [ -z "$mode" ]; then
            mode="tag"
          fi
          ref="${{ github.event.client_payload.tag }}"
          if [ -z "$ref" ]; then
            ref="${{ github.event.inputs.tag }}"
          fi
          if [ -z "$ref" ] && [ "$mode" = "tag" ]; then
            ref=$(gh release view -R jagguvarma15/agent-blueprints --json tagName -q .tagName)
          fi
          if [ -z "$ref" ]; then
            echo "::error::Could not resolve a target ref (mode=$mode)"
            exit 1
          fi
          if [ "$mode" = "sha" ]; then
            # Light validation: must look like a 7-40 hex char SHA.
            if ! echo "$ref" | grep -Eq '^[0-9a-f]{7,40}$'; then
              echo "::error::mode=sha but '$ref' is not a hex SHA"
              exit 1
            fi
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "Target ref: $ref (mode=$mode)"

      - name: Pin vendir.yml to target ref
        run: |
          # Rewrite the `ref:` line so vendir syncs the released tarball
          # (mode=tag) or a specific commit (mode=sha, bootstrap-only).
          # Idempotent: re-running with the same ref+mode is a no-op.
          ref="${{ steps.target.outputs.ref }}"
          mode="${{ steps.target.outputs.mode }}"
          python3 - "$ref" "$mode" <<'PY'
          import re, sys, pathlib
          ref, mode = sys.argv[1], sys.argv[2]
          path = pathlib.Path("vendir.yml")
          text = path.read_text(encoding="utf-8")
          replacement = ref if mode == "sha" else f"refs/tags/{ref}"
          new = re.sub(
              r"(\bref:\s*)\S+",
              lambda m: f"{m.group(1)}{replacement}",
              text,
              count=1,
          )
          path.write_text(new, encoding="utf-8")
          PY

      - name: Install vendir
        uses: carvel-dev/setup-action@v2
        with:
          only: vendir
          vendir: v0.40.0

      - name: Sync vendored tree
        run: vendir sync

      - name: Set up Python (catalog regen)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install generator dependencies
        run: pip install -r scripts/requirements.txt

      - name: Regenerate catalog
        run: python scripts/generate_catalog.py

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- vendir.yml vendored/ vendir.lock.yml catalog.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open sync PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(blueprints): sync vendored to ${{ steps.target.outputs.ref }}'
          title: 'chore(blueprints): sync vendored to ${{ steps.target.outputs.ref }}'
          body: |
            Automated sync of `vendored/blueprints/` to upstream `agent-blueprints` ref **`${{ steps.target.outputs.ref }}`** (mode: `${{ steps.target.outputs.mode }}`).

            **Trigger:** `${{ github.event_name }}`
            ${{ github.event.client_payload.html_url && format('**Release:** {0}', github.event.client_payload.html_url) || '' }}
            ${{ github.event.client_payload.name && format('**Release name:** {0}', github.event.client_payload.name) || '' }}

            Regenerated `catalog.yaml` is included so the catalog drift CI passes.
          branch: chore/blueprints-sync-${{ steps.target.outputs.ref }}
          delete-branch: true
          labels: automated-sync
