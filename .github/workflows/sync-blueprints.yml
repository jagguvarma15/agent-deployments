name: Sync Blueprints Reference Catalog

# Refreshes the committed reference/blueprints/patterns-catalog.yaml to a tagged
# release of agent-blueprints, then regenerates catalog.yaml.
# Triggers:
#   - repository_dispatch (blueprints-release): fired by agent-blueprints'
#     notify-deployments.yml workflow whenever a release is published. The
#     client payload carries the release tag; this workflow fetches the
#     released patterns-catalog.yaml at that tag, regenerates the catalog, and
#     opens a PR with the diff.
#   - workflow_dispatch (manual): admin override. Specify the target tag in
#     the `tag` input; defaults to the latest release on agent-blueprints.
#
# Release-driven (not push-driven): the pinned reference tracks tagged releases,
# not raw main HEAD. Stable consumers, deterministic sync diffs.

on:
  repository_dispatch:
    types: [blueprints-release]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Blueprints release tag (e.g. v0.3.0) OR a 40-char SHA when mode=sha. Leave empty to use the latest release.'
        required: false
        default: ''
      mode:
        description: 'Pin mode: `tag` (default, writes refs/tags/<tag>) or `sha` (writes the input verbatim — bootstrap-only use)'
        required: false
        default: 'tag'
        type: choice
        options:
          - tag
          - sha

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: refresh reference/blueprints/patterns-catalog.yaml
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve target ref
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Precedence: repository_dispatch payload > workflow_dispatch input >
          # latest release lookup via gh. Mode comes from workflow_dispatch
          # input (defaults to `tag`); repository_dispatch is always tag mode.
          mode="${{ github.event.inputs.mode }}"
          if [ -z "$mode" ]; then
            mode="tag"
          fi
          ref="${{ github.event.client_payload.tag }}"
          if [ -z "$ref" ]; then
            ref="${{ github.event.inputs.tag }}"
          fi
          if [ -z "$ref" ] && [ "$mode" = "tag" ]; then
            ref=$(gh release view -R jagguvarma15/agent-blueprints --json tagName -q .tagName)
          fi
          if [ -z "$ref" ]; then
            echo "::error::Could not resolve a target ref (mode=$mode)"
            exit 1
          fi
          if [ "$mode" = "sha" ]; then
            # Light validation: must look like a 7-40 hex char SHA.
            if ! echo "$ref" | grep -Eq '^[0-9a-f]{7,40}$'; then
              echo "::error::mode=sha but '$ref' is not a hex SHA"
              exit 1
            fi
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "Target ref: $ref (mode=$mode)"

      - name: Fetch reference blueprints catalog at ref
        run: |
          # Pull the released patterns-catalog.yaml into the committed reference
          # copy (replaces the old `vendir sync` of the full tree). The catalog
          # generator reads this file; doc bodies are fetched on-demand by the
          # consumer from GitHub, so only the catalog needs pinning here.
          ref="${{ steps.target.outputs.ref }}"
          curl -fsSL \
            "https://raw.githubusercontent.com/jagguvarma15/agent-blueprints/${ref}/patterns-catalog.yaml" \
            -o reference/blueprints/patterns-catalog.yaml
          echo "Fetched reference/blueprints/patterns-catalog.yaml at ${ref}"

      - name: Set up Python (catalog regen)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install generator dependencies
        run: pip install -r scripts/requirements.txt

      - name: Purge stale suggestions directories
        run: |
          # docs/suggestions/<blueprints-version>/ tracks the current upstream
          # pin one-for-one. When the sync workflow bumps to a new upstream
          # tag, the prior version's combo files no longer reflect the active
          # taxonomy — purge them so the catalog generator's single-version
          # invariant holds and so the new version dir can be populated by
          # follow-up authoring PRs.
          ref="${{ steps.target.outputs.ref }}"
          mode="${{ steps.target.outputs.mode }}"
          python3 - "$ref" "$mode" <<'PY'
          import pathlib, shutil, sys
          ref, mode = sys.argv[1], sys.argv[2]
          # Strip refs/tags/ when ref came from a tag; for SHA mode just trim
          # to the canonical 7-char short SHA so the dir name stays human-readable.
          if mode == "tag":
              target = ref.split("/")[-1] if "/" in ref else ref
          else:
              target = ref[:7]
          root = pathlib.Path("docs/suggestions")
          if not root.is_dir():
              print("docs/suggestions/ not present — nothing to purge")
              sys.exit(0)
          purged = []
          for entry in sorted(root.iterdir()):
              if not entry.is_dir() or entry.name.startswith("."):
                  continue
              if entry.name == target:
                  continue
              shutil.rmtree(entry)
              purged.append(entry.name)
          if purged:
              print(f"Purged stale suggestions dirs: {purged}")
          else:
              print(f"No stale suggestions dirs (target={target!r})")
          PY

      - name: Regenerate catalog
        run: python scripts/generate_catalog.py

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- reference/ catalog.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open sync PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(blueprints): sync reference catalog to ${{ steps.target.outputs.ref }}'
          title: 'chore(blueprints): sync reference catalog to ${{ steps.target.outputs.ref }}'
          body: |
            Automated sync of `reference/blueprints/patterns-catalog.yaml` to upstream `agent-blueprints` ref **`${{ steps.target.outputs.ref }}`** (mode: `${{ steps.target.outputs.mode }}`).

            **Trigger:** `${{ github.event_name }}`
            ${{ github.event.client_payload.html_url && format('**Release:** {0}', github.event.client_payload.html_url) || '' }}
            ${{ github.event.client_payload.name && format('**Release name:** {0}', github.event.client_payload.name) || '' }}

            Regenerated `catalog.yaml` is included so the catalog drift CI passes.
          branch: chore/blueprints-sync-${{ steps.target.outputs.ref }}
          delete-branch: true
          labels: automated-sync
