name: Catalog Drift Check

# Two-part determinism gate:
#
# 1. vendored/blueprints/ matches what `vendir sync` would produce. Forces
#    contributors who edit upstream blueprints content (via local
#    vendir sync) to also commit the lock file + vendored tree.
#
# 2. catalog.yaml matches what `scripts/generate_catalog.py` produces from
#    the vendored tree + this repo's own frontmatter. Forces contributors
#    who edit any recipe / capability / framework / vendored content to
#    regenerate the catalog.
#
# Downstream consumers (agent-scaffold) read catalog.yaml + vendored/blueprints/
# directly, so drift in either layer = silent breakage at scaffold runtime.

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  drift-check:
    name: vendored/ + catalog.yaml are up to date
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install vendir
        uses: carvel-dev/setup-action@v2
        with:
          only: vendir
          vendir: v0.40.0

      - name: Verify vendored tree matches vendir.yml
        run: |
          vendir sync
          if ! git diff --quiet -- vendored/ vendir.lock.yml; then
            echo "::error::vendored/blueprints/ is stale relative to upstream agent-blueprints."
            echo "::error::Run: vendir sync"
            echo "::error::Then commit the result (vendored/blueprints/ + vendir.lock.yml)."
            git diff -- vendored/ vendir.lock.yml | head -120
            exit 1
          fi
          echo "vendored/blueprints/ matches vendir sync output"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install generator dependencies
        run: pip install -r scripts/requirements.txt

      - name: Catalog validation self-tests
        run: python scripts/test_catalog_validation.py

      - name: Regenerate catalog
        run: python scripts/generate_catalog.py --out /tmp/catalog.yaml

      - name: Diff against committed catalog
        run: |
          if ! diff -u catalog.yaml /tmp/catalog.yaml; then
            echo "::error::catalog.yaml is stale."
            echo "::error::Run: uv run scripts/generate_catalog.py"
            echo "::error::(or: python scripts/generate_catalog.py)"
            echo "::error::Then commit the result."
            exit 1
          fi
          echo "catalog.yaml matches generator output"
