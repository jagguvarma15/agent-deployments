name: Catalog Drift Check

# Determinism gate: catalog.yaml matches what `scripts/generate_catalog.py`
# produces from this repo's own frontmatter + the committed, SHA-pinned
# reference/blueprints/patterns-catalog.yaml. Forces contributors who edit any
# recipe / capability / framework / port to regenerate the catalog.
#
# Downstream consumers (agent-scaffold) read catalog.yaml directly, so drift =
# silent breakage at scaffold runtime.

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  drift-check:
    name: catalog.yaml is up to date
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install generator dependencies
        run: pip install -r scripts/requirements.txt

      - name: Catalog validation self-tests
        run: python scripts/test_catalog_validation.py

      - name: Regenerate catalog
        run: python scripts/generate_catalog.py --out /tmp/catalog.yaml

      - name: Diff against committed catalog
        run: |
          if ! diff -u catalog.yaml /tmp/catalog.yaml; then
            echo "::error::catalog.yaml is stale."
            echo "::error::Run: uv run scripts/generate_catalog.py"
            echo "::error::(or: python scripts/generate_catalog.py)"
            echo "::error::Then commit the result."
            exit 1
          fi
          echo "catalog.yaml matches generator output"
