name: Recipe Smoke Tests

# Manually triggered for now. The brief schedules a daily cron (commented out
# below); enable it after the per-recipe reference implementations and the
# required repo secrets (ANTHROPIC_API_KEY, TAVILY_API_KEY, OPENAI_API_KEY,
# COHERE_API_KEY) are wired up.
on:
  workflow_dispatch:
    inputs:
      recipe:
        description: "Recipe slug to smoke (matches catalog.recipes[].slug). Leave blank to run the full matrix."
        required: false
        default: ""
  # schedule:
  #   - cron: "0 8 * * *"   # daily 08:00 UTC

permissions:
  contents: read
  issues: write

jobs:
  smoke:
    name: ${{ matrix.recipe }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The validated recipes — those with full ## Reference Implementation
        # bodies. Design-spec recipes are excluded until they land reference
        # implementations.
        recipe:
          - research-assistant
          - docs-rag-qa
          - customer-support-triage
    steps:
      - name: Filter to single recipe (when requested)
        if: ${{ github.event.inputs.recipe != '' && github.event.inputs.recipe != matrix.recipe }}
        run: |
          echo "Skipping ${{ matrix.recipe }} — workflow_dispatch requested only ${{ github.event.inputs.recipe }}."
          echo "skip=true" >> "$GITHUB_ENV"
      - uses: actions/checkout@v6
        if: env.skip != 'true'
      - name: Set up Python
        if: env.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        if: env.skip != 'true'
        run: pip install uv
      - name: Bring up + smoke
        if: env.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        run: uv run scripts/run_smoke_test.py ${{ matrix.recipe }}
      - name: Open tracking issue on failure
        if: failure() && env.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "recipe-smoke ${{ matrix.recipe }} failed (run ${{ github.run_id }})" \
            --body "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label smoke-failure

# Cost note: each smoke job mounts only the load_list entries it needs (see
# `scripts/run_smoke_test.py` — it reads the recipe's load_list from
# catalog.yaml and copies only those files into the working directory). This
# follows GitHub's April 2026 token-efficiency lesson: matrix-driven LLM
# workflows save 8-12 KB of context per LLM call by pruning unused tools.
