services:
  postgres:
    extends:
      file: ../../../common/docker-compose.base.yml
      service: postgres

  redis:
    extends:
      file: ../../../common/docker-compose.base.yml
      service: redis

  langfuse-clickhouse:
    extends:
      file: ../../../common/docker-compose.base.yml
      service: langfuse-clickhouse

  langfuse-minio:
    extends:
      file: ../../../common/docker-compose.base.yml
      service: langfuse-minio

  langfuse:
    extends:
      file: ../../../common/docker-compose.base.yml
      service: langfuse
    depends_on:
      postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_started

  app:
    build:
      context: ../../..
      dockerfile: prototypes/ops-crew/python/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app  # dev hot-reload

volumes:
  postgres_data:
  redis_data:
  langfuse_clickhouse_data:
  langfuse_minio_data:
