# Seed file for catalog.yaml's alias / cross_cutting / non_recipe_stems / min_alias_length blocks.
#
# These values are LIFTED from agent-scaffold's hardcoded maps and pinned here
# as the v1 source of truth. Once they live here, scaffold (PR #3) deletes its
# in-process copies and reads these via the generated catalog instead.
#
# v1.1 follow-up moves the alias declarations into per-doc `aliases:` frontmatter
# (so each doc owns its own alias list); the generator will then derive these
# blocks from the docs and this seed file becomes empty / removable.
#
# Paths are repo-root-relative (e.g. `https://github.com/jagguvarma15/agent-blueprints/blob/main/patterns/react/overview.md`),
# not `docs/`-relative.

# Lowercase prose token -> doc path. Source: scaffold/src/agent_scaffold/context.py ALIAS_TABLE.
#
# Pattern, primitive, and modifier aliases all resolve to canonical upstream
# overview paths under https://github.com/jagguvarma15/agent-blueprints/blob/main/<cohort>/<id>/overview.md (matching
# the catalog's blueprints.directory_entry convention). The previous
# docs/patterns/ lighter mirror has been retired; legacy kebab-case names
# (multi-agent-flat, event-driven, ...) are kept here as alias entries that
# point at the canonical underscored upstream id so old prose still resolves.
aliases:
  # --- Patterns (agent-controlled flow) ---
  react: https://github.com/jagguvarma15/agent-blueprints/blob/main/patterns/react/overview.md
  rag: https://github.com/jagguvarma15/agent-blueprints/blob/main/patterns/rag/overview.md
  agentic_rag: https://github.com/jagguvarma15/agent-blueprints/blob/main/patterns/agentic_rag/overview.md
  agentic-rag: https://github.com/jagguvarma15/agent-blueprints/blob/main/patterns/agentic_rag/overview.md
