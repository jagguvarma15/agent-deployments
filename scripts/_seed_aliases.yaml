  plan_and_execute: https://github.com/jagguvarma15/agent-blueprints/blob/main/patterns/plan_and_execute/overview.md
  plan-and-execute: https://github.com/jagguvarma15/agent-blueprints/blob/main/patterns/plan_and_execute/overview.md
  plan, execute, reflect: https://github.com/jagguvarma15/agent-blueprints/blob/main/patterns/plan_and_execute/overview.md
