  event-driven: https://github.com/jagguvarma15/agent-blueprints/blob/main/patterns/event_driven/overview.md
  event driven: https://github.com/jagguvarma15/agent-blueprints/blob/main/patterns/event_driven/overview.md
  saga: https://github.com/jagguvarma15/agent-blueprints/blob/main/patterns/saga/overview.md
  reflection: https://github.com/jagguvarma15/agent-blueprints/blob/main/patterns/reflection/overview.md
  long_horizon: https://github.com/jagguvarma15/agent-blueprints/blob/main/patterns/long_horizon/overview.md
  long-horizon: https://github.com/jagguvarma15/agent-blueprints/blob/main/patterns/long_horizon/overview.md
  # --- Workflows (code-controlled flow; same patterns/ dir, category=workflow) ---
  prompt chaining: https://github.com/jagguvarma15/agent-blueprints/blob/main/patterns/prompt-chaining/overview.md
