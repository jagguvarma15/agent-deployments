  evaluator-optimizer: https://github.com/jagguvarma15/agent-blueprints/blob/main/patterns/evaluator-optimizer/overview.md
  # --- Primitives (orthogonal building blocks) ---
  memory: https://github.com/jagguvarma15/agent-blueprints/blob/main/primitives/memory/overview.md
