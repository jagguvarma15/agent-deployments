# Prometheus scrape config — emitted by capability `obs.grafana-stack`.
# Mounted into the prometheus service at /etc/prometheus/prometheus.yml.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    stack: agent-deployments

scrape_configs:
  - job_name: app
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8000
        labels:
          service: app

  - job_name: kafka-exporter
    static_configs:
      - targets:
          - kafka-exporter:9308
        labels:
          service: kafka
    honor_labels: true

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          service: node

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets:
          - grafana:3000
        labels:
          service: grafana

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          service: prometheus
