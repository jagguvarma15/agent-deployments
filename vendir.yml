apiVersion: vendir.k14s.io/v1alpha1
kind: Config
minimumRequiredVersion: 0.40.0

# Vendored snapshot of agent-blueprints — fetched from upstream + pinned in
# vendir.lock.yml for determinism. This makes agent-deployments the single
# source of truth that downstream consumers (agent-scaffold, third-party
# tools) read: blueprints content lives under vendored/blueprints/ in this
# repo, no separate fetch required.
#
# Release-driven sync:
#   - When agent-blueprints publishes a release, its notify-deployments.yml
#     workflow fires a repository_dispatch (`blueprints-release`) here.
#   - .github/workflows/sync-blueprints.yml consumes the dispatch, rewrites
#     the `ref:` line below to the new tag (`refs/tags/<version>`), runs
#     `vendir sync`, regenerates catalog.yaml, and opens a PR with the diff.
#   - Admins can manually trigger the sync workflow against any tag via
#     workflow_dispatch — useful for backfilling or rolling forward.
#
# Determinism:
#   - vendir.lock.yml carries the resolved commit SHA for the current ref.
#   - CI verifies `vendir sync && git diff --exit-code` produces no diff.
#
# Bootstrap note (SHA-pinned, transition to tag at first release):
#   `ref:` below is currently a SHA pin because agent-blueprints has not cut
#   its first release yet. SHA pinning gives us deterministic syncs during
#   the bootstrap window without the floating-branch hazard `origin/main`
#   carries. The moment agent-blueprints publishes `v0.1.0`, the sync
#   workflow (`sync-blueprints.yml`) will rewrite this line to
#   `refs/tags/v0.1.0`. From then on, `ref:` should always be a tag, never
#   a SHA and never a branch.
#
# Path filters: the full 3-cohort taxonomy (patterns + primitives +
# modifiers), foundations, composition, taxonomy.yaml, and the AI-tool
# discovery surface (llms.txt + agents.md + meta/HOW_TO_ADD_AN_ENTRY.md)
# are all included. Runnable code under <cohort>/*/code/ is excluded
# (scaffold doesn't read it; would bloat the snapshot).
directories:
  - path: vendored/blueprints
    contents:
      - path: .
        git:
          url: https://github.com/jagguvarma15/agent-blueprints
          ref: dfd824d905ec28d49eea01c286ba684246dab81f
          # No shallow `depth:` — a SHA pin is only fetchable at depth 1 while
          # it is the upstream tip. Once upstream advances past it, a shallow
          # fetch of the new tip can't reach the pinned commit ("unable to
          # read tree"). A full fetch reaches any commit reachable from a ref,
          # so the pin stays syncable as upstream moves on.
        includePaths:
          - "patterns/**"
          - "workflows/**"
          - "primitives/**"
          - "modifiers/**"
          - "foundations/**"
          - "composition/**"
          - "meta/HOW_TO_ADD_AN_ENTRY.md"
          - "patterns-catalog.yaml"
          - "PATTERNS_CATALOG_SCHEMA.md"
          - "taxonomy.yaml"
          - "agents.md"
          - "llms.txt"
          - "README.md"
          - "LICENSE"
        excludePaths:
          - "patterns/**/code/**"
          - "workflows/**/code/**"
          - "primitives/**/code/**"
          - "modifiers/**/code/**"
          - "**/.DS_Store"
          - "**/__pycache__/**"
          - "**/node_modules/**"
